name: Build Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Set dev version
        shell: bash
        run: echo "DEV_VERSION=$(node -p "require('./package.json').version")-dev.$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and package
        run: pnpm run build && pnpm exec electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_app_version: ${{ env.DEV_VERSION }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jellytunes-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
          retention-days: 7
