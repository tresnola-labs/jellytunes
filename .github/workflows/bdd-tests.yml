name: BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bdd-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build app
        run: pnpm build
      
      - name: Run BDD tests with XVFB
        uses: coactions/setup-xvfb@v1
        with:
          run: pnpm test:bdd
          
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-test-results
          path: |
            tests/bdd/reports/
            tests/bdd/screenshots/
