name: BDD Tests

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # nightly 3am
  workflow_dispatch:      # manual
  release:
    types: [published]

jobs:
  bdd-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build app
        run: pnpm build
      
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      
      - name: Run BDD tests with XVFB
        run: xvfb-run --auto-servernum pnpm test:bdd:ci
          
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-test-results
          path: |
            tests/bdd/reports/
            tests/bdd/screenshots/
          retention-days: 30